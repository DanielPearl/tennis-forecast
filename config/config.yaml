# Baseline Break — Tennis Forecast config.
#
# The pre-match model gives the baseline probability before the match
# starts. The live model adjusts that probability during the match
# using real-time match stats and market movement, then flags spots
# where the market may be overreacting.
#
# Edit values here, not the code.

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  outputs_dir: data/outputs
  artifacts_dir: data/processed/artifacts
  watchlist_csv: data/outputs/watchlist.csv
  watchlist_json: data/outputs/watchlist.json
  backtest_csv: data/outputs/backtest_results.csv

# ---------------------------------------------------------------------
# Data sources. The Sackmann GitHub mirrors are the de-facto free
# baseline for tennis match data — tour-level singles, surface tagged,
# back to 1968 (ATP) / 1920s (WTA). We pull a rolling window so re-train
# is fast.
# ---------------------------------------------------------------------
data:
  atp_repo_base: https://raw.githubusercontent.com/JeffSackmann/tennis_atp/master
  wta_repo_base: https://raw.githubusercontent.com/JeffSackmann/tennis_wta/master
  # Years pulled on `scripts/run_daily_prematch.py --refresh-data`.
  # Full Open Era window (1968 → present) for maximum Elo history and
  # career-rate stability. Sackmann publishes ATP files back to 1968
  # and WTA files back to the 1920s; ``fetch_year`` treats a 404 as
  # "year not published" and skips silently, so any early WTA gaps
  # are harmless. Rows are still cheap — ~3-4k tour-level matches
  # per tour per year × ~58 years × 2 tours settles around 400k
  # matches, doubled to ~800k after y-balance mirroring. Serve/return
  # columns only become reliable in the Sackmann files ~1991, but
  # the trainer imputes missing values so pre-1991 matches still
  # contribute Elo + form dynamics without polluting the rolling
  # serve-percent features.
  history_start_year: 1968
  history_end_year: 2026
  tours: ["atp", "wta"]

# ---------------------------------------------------------------------
# Elo configuration. Surface-specific Elos are the single most predictive
# feature for tennis match outcomes (Sipko/Knottenbelt 2015, Kovalchik
# 2016) and dominate any reasonable serve/return rolling stats panel.
# ---------------------------------------------------------------------
elo:
  default_rating: 1500.0
  k_base: 32.0
  # Lower K once a player has 30+ matches; otherwise underdog volatility
  # dominates and ratings drift.
  k_floor: 16.0
  k_decay_matches: 30
  # Surface Elos use a slightly higher K to absorb the smaller per-surface
  # match counts. They're blended 60/40 with overall Elo at inference.
  surface_k_multiplier: 1.15
  surface_blend: 0.60

model:
  # Held-out evaluation window. We keep the most recent 12 months as the
  # test set so calibration metrics reflect the current player pool, not
  # players who retired five years ago.
  test_window_months: 12
  random_state: 42
  # Feature pruning happens by walk-forward permutation importance during
  # training (see src/models/train_prematch_model.py).
  max_features: 18
  ensemble:
    use_xgboost_if_available: true
    n_estimators: 400
    learning_rate: 0.05
    max_depth: 4

# ---------------------------------------------------------------------
# Live-adjustment rules. Phase-1 keeps these explicit so we can debug
# every nudge; phase-2 will replace them with a small ML adjustment
# model trained on point-by-point logs once we have enough closed bets.
# Numbers below are conservative deltas — they shift the baseline
# probability by at most ~6pp under realistic in-match scenarios.
# ---------------------------------------------------------------------
live_rules:
  # Each completed game shifts the baseline toward the in-match leader
  # by `per_game_weight`, capped at `max_in_match_shift`.
  #
  # Zeroed 2026-06-02: live adjustment was adding overconfidence on
  # top of an already-imperfect pre-match calibration. Setting weight
  # to 0 here AND ``use_trained_inmatch_model: false`` below makes
  # live_prob_a = pre_match_prob_a, so the bot trades on the
  # Platt-calibrated pre-match prediction with no in-match nudge.
  per_game_weight: 0.0
  max_in_match_shift: 0.0
  # First-serve % drop ≥ this much vs match average → fatigue/injury hint.
  first_serve_pct_drop_flag: 0.10
  # If serve % is unusually strong, flag "underlying stats remain strong"
  # — useful for the "lost a set but stats are good" rebound case.
  serve_strength_z_threshold: 0.7
  # Tiebreak / 5th-set / medical timeout → bump volatility score.
  tiebreak_volatility_bump: 0.20
  decider_volatility_bump: 0.15
  medical_timeout_volatility_bump: 0.25
  injury_risk_drop_threshold: 0.05  # serve %
  # Serve-velocity decline (trailing-10 first-serve speed minus match
  # baseline) → nudge against the slowing player. ≥ 8 km/h drop fires
  # the rule; this is the magnitude of the negative-direction delta.
  serve_speed_decline_pp: 0.04
  # Market-overreaction band. If the market moved more than `overreaction_market_move`
  # while the model-adjusted probability moved less than `overreaction_model_move`,
  # we flag MARKET_OVERREACTION (only one direction at a time).
  overreaction_market_move: 0.07
  overreaction_model_move: 0.025
  # Use the trained PBP-based in-match adjustment model
  # (data/processed/artifacts/inmatch_model.joblib) instead of the
  # rules-only nudge. Falls back to rules when the artifact is missing.
  # Backtest on 2024 slam PBP: Brier 0.175 vs rules 0.226 (22.7% better).
  #
  # Disabled 2026-06-02: on 30 real Kalshi bets, the live-prob bucket
  # 55-65% won only 40% (15pp overconfident) and average live_prob
  # for losers (50.1%) exceeded average for winners (47.0%) — a sign
  # the in-match adjustment is adding noise/bias rather than signal.
  # Until we rebuild the pre-match model and re-train an inmatch
  # variant on top of that, the bot trades on calibrated pre-match
  # prob only (per_game_weight=0 below also zeroes the rules layer).
  use_trained_inmatch_model: false

# ---------------------------------------------------------------------
# Trading thresholds. Conservative on purpose: we'd rather print fewer
# signals than fire on noise. The NBA bot uses similar gates.
# Slippage covers half-spread + book-walk on a small order; it's the
# practical floor for an edge to be tradeable, not theoretical.
# ---------------------------------------------------------------------
trading:
  # 695-trade paper audit (2026-07-07) showed the 5-15pp edge bucket ran
  # -0.7% ROI across 436 opens (63% of trades) while the 15pp+ bucket ran
  # +2-9% across the other ~250. Everything below 15pp is model noise
  # against a slightly-more-accurate Kalshi mid — raising the floor
  # kills the losing tail without touching the wins. The old unified
  # 5c floor lives on for the other bots that don't have this depth
  # of paper history yet.
  slippage_pct: 0.02
  small_edge_min: 0.15
  strong_edge_min: 0.18
  min_ev: 0.03
  require_strong_edge: false
  min_market_prob: 0.25
  max_market_prob: 0.75
  max_entry_price_cents: 70
  max_tradable_volatility: 0.55
  min_open_interest: 50
  max_spread_cents: 6
  # Hard cap on simultaneous open paper positions. The simulator ranks
  # every eligible row by edge × EV and opens only the top N each tick.
  max_open_positions: 10
  bet_size: 1.0
  # Profit-lock exit: close any open position whose side has drifted
  # to >= this market_prob on Kalshi. At 95+¢ on a side you hold, the
  # remaining edge is rounding error vs the variance of holding to
  # settlement (risk 95¢ for ≤5¢ upside), so we lock in profit and
  # recycle capital. Shared rule with darts / table-tennis.
  profit_lock_market_prob: 0.95
  # Extreme-edge guardrail.
  # Edges this large are usually model overconfidence (sparse Elo for
  # qualifiers, surface miscalibration, missing real-world info the
  # market is pricing) rather than real signal.
  #
  # 2026-05-19: lost 8/8 settled trades where |edge| averaged +27pp;
  # setting this to 0.20 would have skipped 6 of those 8.
  #
  # 2026-05-27 calibration data on 11 settled live bets: 10-15pp
  # bucket won 50% (predicted ~62%); 15-20pp bucket won 33%
  # (predicted ~68%) — the strongest model picks are the worst
  # calibrated, the classic over-confident-tail signature. Tightening
  # the cap from 0.20 to 0.12 cuts off the 15-20pp bucket entirely;
  # would have skipped 4 of the 6 losses (BAEBUR +15.0, NORVAL +17.1,
  # KORWAN +17.4, plus DAVTIR +15.6) with no foregone wins (the only
  # 15-20pp win was TEIFRE +16.8, but we'd still have 2 of 6 from the
  # 10-15pp bucket).
  #
  # Raised 0.12 → 0.18 after the Platt calibration layer started
  # blending toward observed Kalshi outcomes — the layer corrects
  # part of the over-confidence inside the gate's window, so the
  # 12pp ceiling was too tight (bot was sitting on 2 positions and
  # skipping +19-23pp edges on JODZVE / FONMEN).
  max_edge_skip: 0.18
  # Stake taper on large-but-not-extreme edges. Between
  # ``taper_edge_above`` and ``max_edge_skip``, scale stake linearly
  # from full to ``taper_min_stake_frac``. Acts as Kelly-style
  # variance protection without abandoning the trade entirely.
  taper_edge_above: 0.08
  taper_min_stake_frac: 0.50

# ---------------------------------------------------------------------
# Dashboard. Stdlib http.server (no Flask dependency) — same pattern
# as the trading-dashboard project on the droplet.
# ---------------------------------------------------------------------
dashboard:
  host: "0.0.0.0"
  port: 8090
  refresh_seconds: 60
  title: "Baseline Break — Tennis Forecast"
